<div class="mx-auto max-w-[560px] px-10 py-8 pb-16">
  <div class="mb-6">
    <a routerLink="/tasks" class="text-[13px] font-medium text-brand hover:underline">← My Tasks</a>
    <h1 class="m-0 mt-1 text-2xl font-bold tracking-tight text-ink">New Task</h1>
  </div>

  @if (errorMessage()) {
    <div role="alert" aria-live="polite" class="mb-4 rounded-[10px] border border-[#fecdd3] bg-[#fff1f2] px-4 py-3 text-sm text-accent-rose">
      {{ errorMessage() }}
    </div>
  }

  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="rounded-card border border-hairline bg-card p-6 shadow-card space-y-5"
    aria-label="Create task form"
  >
    <div>
      <label for="relatesToId" class="block text-[13px] font-medium text-ink-strong">
        Relates to <span aria-hidden="true">*</span>
      </label>
      <select
        id="relatesToId"
        formControlName="relatesToId"
        aria-required="true"
        class="mt-1.5 block w-full rounded-[8px] border border-hairline bg-card px-3 py-2 text-sm text-ink outline-none focus:border-brand focus:ring-2 focus:ring-brand-tint"
      >
        <option [ngValue]="null">{{ loadingEmployees() ? 'Loading…' : 'Select employee' }}</option>
        @for (employee of employees(); track employee.id) {
          <option [ngValue]="employee.id">{{ employee.firstName }} {{ employee.lastName }}</option>
        }
      </select>
      @if (form.controls.relatesToId.invalid && form.controls.relatesToId.touched) {
        <p class="mt-1 text-xs text-accent-rose" aria-live="polite">Please select an employee.</p>
      }
    </div>

    <div>
      <label for="title" class="block text-[13px] font-medium text-ink-strong">
        Title <span aria-hidden="true">*</span>
      </label>
      <input
        id="title"
        type="text"
        formControlName="title"
        aria-required="true"
        class="mt-1.5 block w-full rounded-[8px] border border-hairline bg-card px-3 py-2 text-sm text-ink outline-none focus:border-brand focus:ring-2 focus:ring-brand-tint"
      />
      @if (form.controls.title.invalid && form.controls.title.touched) {
        <p class="mt-1 text-xs text-accent-rose" aria-live="polite">Title is required.</p>
      }
    </div>

    <div>
      <label for="description" class="block text-[13px] font-medium text-ink-strong">Description</label>
      <textarea
        id="description"
        formControlName="description"
        rows="3"
        class="mt-1.5 block w-full rounded-[8px] border border-hairline bg-card px-3 py-2 text-sm text-ink outline-none focus:border-brand focus:ring-2 focus:ring-brand-tint"
      ></textarea>
    </div>

    <div>
      <label for="dueDate" class="block text-[13px] font-medium text-ink-strong">Due date</label>
      <input
        id="dueDate"
        type="date"
        formControlName="dueDate"
        class="mt-1.5 block w-full rounded-[8px] border border-hairline bg-card px-3 py-2 text-sm text-ink outline-none focus:border-brand focus:ring-2 focus:ring-brand-tint"
      />
    </div>

    <div>
      <label for="assigneeId" class="block text-[13px] font-medium text-ink-strong">Assignee</label>
      <select
        id="assigneeId"
        formControlName="assigneeId"
        class="mt-1.5 block w-full rounded-[8px] border border-hairline bg-card px-3 py-2 text-sm text-ink outline-none focus:border-brand focus:ring-2 focus:ring-brand-tint"
      >
        <option [ngValue]="null">None</option>
        @for (employee of employees(); track employee.id) {
          <option [ngValue]="employee.id">{{ employee.firstName }} {{ employee.lastName }}</option>
        }
      </select>
    </div>

    <div class="flex items-center gap-3 pt-1">
      <button
        type="submit"
        [disabled]="submitting()"
        class="inline-flex items-center gap-1.5 rounded-[8px] bg-brand px-4 py-2.5 text-[13px] font-semibold text-white hover:bg-brand-hover disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ submitting() ? 'Saving…' : 'Create task' }}
      </button>
      <button
        type="button"
        (click)="cancel()"
        class="rounded-[8px] border border-hairline bg-card px-4 py-2.5 text-[13px] font-semibold text-ink-body hover:bg-page"
      >
        Cancel
      </button>
    </div>
  </form>
</div>
