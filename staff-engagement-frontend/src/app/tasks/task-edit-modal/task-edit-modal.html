<app-modal
  [open]="open()"
  heading="Edit task"
  saveLabel="Save changes"
  [saving]="submitting()"
  (save)="save()"
  (cancel)="close()"
>
  <form [formGroup]="form" (ngSubmit)="save()" novalidate class="flex flex-col gap-3.5">
    <div>
      <label for="edit-task-title" class="mb-1.5 block text-xs font-semibold text-ink-body">
        Title <span aria-hidden="true" class="text-accent-rose">*</span>
      </label>
      <input
        id="edit-task-title"
        type="text"
        formControlName="title"
        class="w-full rounded-[8px] border border-hairline px-2.5 py-2.5 text-[13.5px] text-ink outline-none focus:border-brand focus:ring-2 focus:ring-brand-tint"
        [class.border-accent-rose]="form.controls.title.invalid && form.controls.title.touched"
      />
      @if (form.controls.title.invalid && form.controls.title.touched) {
        <p class="mt-1 text-xs text-accent-rose" aria-live="polite">Title is required.</p>
      }
    </div>

    <div>
      <label for="edit-task-description" class="mb-1.5 block text-xs font-semibold text-ink-body">Description</label>
      <textarea
        id="edit-task-description"
        formControlName="description"
        rows="3"
        class="w-full rounded-[8px] border border-hairline px-2.5 py-2.5 text-[13.5px] text-ink outline-none focus:border-brand focus:ring-2 focus:ring-brand-tint"
      ></textarea>
    </div>

    <div>
      <label for="edit-task-dueDate" class="mb-1.5 block text-xs font-semibold text-ink-body">Due date</label>
      <input
        id="edit-task-dueDate"
        type="date"
        formControlName="dueDate"
        class="w-full rounded-[8px] border border-hairline px-2.5 py-2.5 text-[13.5px] text-ink outline-none focus:border-brand focus:ring-2 focus:ring-brand-tint"
      />
    </div>

    <div>
      <label for="edit-task-assignee" class="mb-1.5 block text-xs font-semibold text-ink-body">Assignee</label>
      <select
        id="edit-task-assignee"
        formControlName="assigneeId"
        class="w-full rounded-[8px] border border-hairline px-2.5 py-2.5 text-[13.5px] text-ink outline-none focus:border-brand focus:ring-2 focus:ring-brand-tint"
      >
        <option [ngValue]="null">None</option>
        @for (emp of employees(); track emp.id) {
          <option [ngValue]="emp.id">{{ emp.firstName }} {{ emp.lastName }}</option>
        }
      </select>
    </div>

    @if (errorMessage(); as msg) {
      <p class="text-[12.5px] text-accent-rose" role="alert" aria-live="assertive">{{ msg }}</p>
    }
  </form>
</app-modal>
