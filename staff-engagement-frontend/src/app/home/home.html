<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="text-center space-y-4">
    <h1 class="text-3xl font-semibold text-gray-900">{{ greeting() }}</h1>
    <p class="text-gray-600">You are signed in to Staff Engagement.</p>
    <div class="flex gap-3 justify-center">
      <a routerLink="/employees"
         class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        Employees
      </a>
      <button type="button" (click)="logout()"
              class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        Sign out
      </button>
    </div>
  </div>
</div>
