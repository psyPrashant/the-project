<div class="flex h-screen w-full overflow-hidden bg-page text-ink">
  <aside class="flex w-[250px] flex-none flex-col border-r border-hairline bg-card px-3.5 py-[18px]">
    <div class="flex items-center gap-2.5 px-2 pt-1">
      <div class="flex h-[26px] w-[26px] items-center justify-center rounded-[7px] bg-brand" aria-hidden="true">
        <div class="h-[11px] w-[11px] rounded-full border-2 border-white"></div>
      </div>
      <div class="text-[15px] font-bold tracking-tight">Engage</div>
    </div>

    <nav aria-label="Primary" class="mt-[22px] flex flex-col gap-0.5">
      <a routerLink="/dashboard" routerLinkActive="nav-link-active" class="nav-link">
        <svg aria-hidden="true" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3.5" y="3.5" width="7" height="7" rx="1.6"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.6"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.6"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.6"/></svg>
        My Dashboard
      </a>
      <a routerLink="/people" routerLinkActive="nav-link-active" class="nav-link">
        <svg aria-hidden="true" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/><circle cx="17" cy="8.5" r="2.6" opacity=".55"/><path d="M16 14.2c2.6.2 4.5 2.1 4.5 4.8" opacity=".55"/></svg>
        People
      </a>
      <a routerLink="/skills" routerLinkActive="nav-link-active" class="nav-link">
        <svg aria-hidden="true" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="3.4" height="9" rx="1"/><rect x="10.3" y="6" width="3.4" height="14" rx="1"/><rect x="16.6" y="14" width="3.4" height="6" rx="1"/></svg>
        Skills Register
      </a>
      <a routerLink="/tasks" routerLinkActive="nav-link-active" class="nav-link">
        <svg aria-hidden="true" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="3.5"/><path d="M8.5 12.3l2.4 2.4 4.6-5"/></svg>
        My Tasks
      </a>
    </nav>

    <div class="mt-auto border-t border-hairline-soft pt-3">
      <div class="flex items-center justify-between px-1">
        <div class="text-[10.5px] font-semibold uppercase tracking-wider text-muted">Signed in as</div>
        <button
          type="button"
          (click)="signOut()"
          aria-label="Sign out"
          class="flex flex-none items-center justify-center rounded-[7px] border border-hairline bg-card p-1.5 text-ink-soft hover:bg-page"
        >
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
      </div>
      @if (profileLink(); as link) {
        <a
          [routerLink]="link"
          class="mt-2 flex items-center gap-2.5 rounded-[9px] px-1 py-1 hover:bg-page"
          aria-label="Open my profile"
        >
          <div
            class="flex h-[30px] w-[30px] flex-none items-center justify-center rounded-full text-xs font-semibold text-white"
            [style.background]="userColor()"
            aria-hidden="true"
          >{{ userInitials() }}</div>
          <div class="min-w-0 flex-1">
            <div class="truncate text-[13px] font-semibold text-ink hover:text-brand">{{ userName() }}</div>
          </div>
        </a>
      } @else {
        <div class="mt-2 flex items-center gap-2.5 px-1">
          <div
            class="flex h-[30px] w-[30px] flex-none items-center justify-center rounded-full text-xs font-semibold text-white"
            [style.background]="userColor()"
            aria-hidden="true"
          >{{ userInitials() }}</div>
          <div class="min-w-0 flex-1">
            <div class="truncate text-[13px] font-semibold text-ink">{{ userName() }}</div>
          </div>
        </div>
      }
    </div>
  </aside>

  <main class="min-w-0 flex-1 overflow-y-auto">
    <router-outlet />
  </main>
</div>
