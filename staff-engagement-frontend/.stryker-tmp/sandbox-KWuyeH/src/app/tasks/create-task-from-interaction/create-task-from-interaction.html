<div class="min-h-screen bg-gray-50 py-8 px-4">
  <div class="max-w-lg mx-auto">

    <div class="mb-6">
      <a routerLink="/tasks/mine" class="text-sm text-indigo-600 hover:underline">← Back</a>
      <h1 class="text-2xl font-semibold text-gray-900 mt-1">Create Follow-up Task</h1>
    </div>

    @if (errorMessage()) {
      <div role="alert" aria-live="polite" class="mb-4 rounded-md bg-red-50 p-4 text-sm text-red-700">
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm space-y-4"
          aria-label="Create follow-up task form">

      <div>
        <label for="title" class="block text-sm font-medium text-gray-700">Title <span aria-hidden="true">*</span></label>
        <input id="title" type="text" formControlName="title"
               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
               aria-required="true" />
        @if (form.controls.title.invalid && form.controls.title.touched) {
          <p class="mt-1 text-xs text-red-600" aria-live="polite">Title is required.</p>
        }
      </div>

      <div>
        <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
        <textarea id="description" formControlName="description" rows="3"
                  class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
      </div>

      <div>
        <label for="dueDate" class="block text-sm font-medium text-gray-700">Due date</label>
        <input id="dueDate" type="date" formControlName="dueDate"
               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
      </div>

      <div>
        <label for="assigneeId" class="block text-sm font-medium text-gray-700">Assignee</label>
        <select id="assigneeId" formControlName="assigneeId"
                class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
          <option [ngValue]="null">None</option>
          @for (employee of employees(); track employee.id) {
            <option [ngValue]="employee.id">{{ employee.firstName }} {{ employee.lastName }}</option>
          }
        </select>
      </div>

      <div class="flex items-center gap-3 pt-2">
        <button type="submit" [disabled]="submitting()"
                class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
          {{ submitting() ? 'Saving…' : 'Create Task' }}
        </button>
        <button type="button" (click)="cancel()"
                class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500">
          Cancel
        </button>
      </div>

    </form>
  </div>
</div>
