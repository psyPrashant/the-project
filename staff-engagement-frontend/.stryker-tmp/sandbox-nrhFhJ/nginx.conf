server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Spring Boot backend, preserving the /api prefix.
    # The backend mounts its controllers under /api (e.g. @RequestMapping("/api/auth")),
    # so /api/auth/login -> http://backend:8080/api/auth/login. Do NOT add a trailing
    # slash to proxy_pass — that would strip the /api prefix and the request would
    # miss the permitAll() rule and be rejected as 401.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}