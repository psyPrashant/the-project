name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (build & test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: staff-engagement-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: staff-engagement-frontend/package.json
          cache: npm
          cache-dependency-path: staff-engagement-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

      - name: Unit/component tests
        run: npm run test:ci

  e2e:
    name: Frontend (e2e smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: staff-engagement-frontend

    # The auth e2e drives a real browser through /api/auth/login, so it needs a
    # live backend + Postgres. We stand up Postgres as a service container and
    # run the freshly built backend jar (self-seeds via data.sql), then Playwright's
    # webServer starts `ng serve` and the tests exercise the full stack.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: staff_engagement
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d staff_engagement"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: staff-engagement-frontend/package.json
          cache: npm
          cache-dependency-path: staff-engagement-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: staff-engagement-backend/pom.xml

      - name: Build backend (skip tests; the backend job covers those)
        working-directory: staff-engagement-backend
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp package -DskipTests

      - name: Start backend
        working-directory: staff-engagement-backend
        run: |
          nohup java -jar target/*.jar > backend.log 2>&1 &
          echo "Backend PID: $!"

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend did not become healthy"
          cat ../staff-engagement-backend/backend.log
          exit 1

      - name: E2e smoke test
        run: npm run e2e

      - name: Backend logs (on failure)
        if: failure()
        working-directory: staff-engagement-backend
        run: cat backend.log || true

  backend:
    name: Backend (build & test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: staff-engagement-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build & test
        run: ./mvnw -B -ntp verify