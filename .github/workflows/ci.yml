name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (build & test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: staff-engagement-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: staff-engagement-frontend/package.json
          cache: npm
          cache-dependency-path: staff-engagement-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

      - name: Test
        run: npm test

  backend:
    name: Backend (build & test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: staff-engagement-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build & test
        run: ./mvnw -B -ntp verify