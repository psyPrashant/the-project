spring.application.name=staff-engagement-backend

# PostgreSQL datasource. Values default to local dev; overridden by Docker env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/staff_engagement}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Dev-friendly schema management
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
