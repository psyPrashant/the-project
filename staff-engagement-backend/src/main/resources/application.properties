spring.application.name=staff-engagement-backend

# PostgreSQL datasource. Values default to local dev; overridden by Docker env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/staff_engagement}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Dev-friendly schema management
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Flyway: baseline the existing schema on first run, then apply new migrations.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Run data.sql after Hibernate creates/updates the schema, and on every startup.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Security / JWT (F6). Override JWT_SECRET in production.
app.jwt.secret=${JWT_SECRET:c3RhZmYtZW5nYWdlbWVudC1wb2MtZGV2LWp3dC1zZWNyZXQta2V5LW5vdC1mb3ItcHJvZHVjdGlvbi11c2U}
app.jwt.issuer=staff-engagement
app.jwt.expiry-minutes=${JWT_EXPIRY_MINUTES:480}

# Keep only health public; everything else requires auth.
management.endpoints.web.exposure.include=health
