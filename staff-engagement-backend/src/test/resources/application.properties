# Test profile: use an in-memory H2 database so the Spring context loads
# without a running PostgreSQL instance (e.g. in CI). Overrides the main
# application.properties, which is classpath-ordered behind test resources.
spring.application.name=staff-engagement-backend

# H2 in PostgreSQL compatibility mode keeps behaviour close to production.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Recreate the schema per test run.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false