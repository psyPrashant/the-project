# Test profile. The datasource (url/username/password) is wired to a real
# PostgreSQL container by IntegrationTestBase via @ServiceConnection, so the
# Spring context exercises the production database engine in every integration
# test run. Unit tests (*Test) do not load this context.
spring.application.name=staff-engagement-backend

# Force IPv4 loopback so TestRestTemplate can connect on Windows
# (avoids "Unable to establish loopback connection" when localhost resolves to ::1).
server.address=127.0.0.1

# Recreate the schema per integration test run against the Testcontainers Postgres.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Flyway is disabled in tests: the integration test container is reset each run and
# Hibernate create-drop builds the schema. Production/dev rely on Flyway migrations.
spring.flyway.enabled=false

# Seed data.sql into the recreated test schema too (this file shadows the main one,
# so these keys MUST be present here or integration tests find no seeded Employees).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Test JWT config (short expiry so the expired-token negative path is cheap to exercise).
app.jwt.secret=c3RhZmYtZW5nYWdlbWVudC1wb2MtZGV2LWp3dC1zZWNyZXQta2V5LW5vdC1mb3ItcHJvZHVjdGlvbi11c2U
app.jwt.issuer=staff-engagement
app.jwt.expiry-minutes=480