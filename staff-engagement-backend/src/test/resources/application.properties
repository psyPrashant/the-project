# Test profile. The datasource (url/username/password/driver) is wired to a
# real PostgreSQL container by AbstractIntegrationTest via @DynamicPropertySource,
# so the Spring context exercises the production database engine in every test run.
spring.application.name=staff-engagement-backend

# Recreate the schema per test run against the Testcontainers Postgres instance.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false